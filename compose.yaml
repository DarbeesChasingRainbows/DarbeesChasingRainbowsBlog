name: darbees-dev

services:
  arango:
    image: arangodb:3.12
    command: ["--vector-index"]
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:-password}
    ports:
      - "8529:8529"
    volumes:
      - arango-data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint http+tcp://localhost:8529 --server.username root --server.password ${ARANGO_ROOT_PASSWORD:-password} --javascript.execute-string 'print(db._version())' --quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: "root"
    command:
      - start
      - --user
      - root
      - --pass
      - ${SURREAL_ROOT_PASSWORD:-password}
      - --bind
      - 0.0.0.0:8000
      - rocksdb:///data/surreal.db
    environment:
      SURREAL_LOG: info
    ports:
      - "8000:8000"
    volumes:
      - surreal-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  dais-bridge-dev:
    profiles: ["dev"]
    build:
      context: ./dais-bridge
      target: dev
    command: ["dotnet", "watch", "run", "--no-launch-profile", "--project", "dais-bridge.csproj"]
    volumes:
      - ./dais-bridge:/src:Z
    working_dir: /src
    environment:
      ARANGO_URL: http://arango:8529
      ARANGO_USER: root
      ARANGO_PASSWORD: ${ARANGO_ROOT_PASSWORD:-password}
      LLM_CHAT_URL: http://host.containers.internal:8080/v1
      LLM_EMBEDDING_URL: http://host.containers.internal:8081/v1
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_ID: ${AI_MODEL_ID:-llama-4-maverick}
      AI_EMBEDDING_MODEL_ID: ${AI_EMBEDDING_MODEL_ID:-qwen3-embedding-8b}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION:-4096}
      ARANGO_DATABASE: ${ARANGO_DATABASE:-darbees_knowledge}
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      SURREAL_URL: http://surrealdb:8000
      SURREAL_NS: darbees
      SURREAL_DB: memory
      SURREAL_USER: root
      SURREAL_PASS: ${SURREAL_ROOT_PASSWORD:-password}
      MEMORY_BACKEND: ${MEMORY_BACKEND:-arango}
    ports:
      - "5000:5000"
    depends_on:
      arango: { condition: service_healthy }
      surrealdb: { condition: service_healthy }
    restart: unless-stopped

  dais-bridge-prod:
    profiles: ["prod"]
    build:
      context: ./dais-bridge
      target: prod
    environment:
      ARANGO_URL: http://arango:8529
      ARANGO_USER: root
      ARANGO_PASSWORD: ${ARANGO_ROOT_PASSWORD:-password}
      LLM_CHAT_URL: http://host.containers.internal:8080/v1
      LLM_EMBEDDING_URL: http://host.containers.internal:8081/v1
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_ID: ${AI_MODEL_ID:-llama-4-maverick}
      AI_EMBEDDING_MODEL_ID: ${AI_EMBEDDING_MODEL_ID:-qwen3-embedding-8b}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION:-4096}
      ARANGO_DATABASE: ${ARANGO_DATABASE:-darbees_knowledge}
      SURREAL_URL: http://surrealdb:8000
      SURREAL_NS: darbees
      SURREAL_DB: memory
      SURREAL_USER: root
      SURREAL_PASS: ${SURREAL_ROOT_PASSWORD:-password}
      MEMORY_BACKEND: ${MEMORY_BACKEND:-arango}
    ports:
      - "5000:5000"
    depends_on:
      arango: { condition: service_healthy }
      surrealdb: { condition: service_healthy }
    restart: unless-stopped

volumes:
  arango-data:
  surreal-data:
